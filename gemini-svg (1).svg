<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610">
  <defs>
    <radialGradient id="glowPurple" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowCyan" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <clipPath id="type-1">
      <rect x="0" y="-20" width="0" height="40">
        <animate attributeName="width" values="0;280;280;0;0" keyTimes="0;0.05;0.15;0.20;1" dur="20s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type-2">
      <rect x="0" y="-20" width="0" height="40">
        <animate attributeName="width" values="0;0;280;280;0;0" keyTimes="0;0.20;0.25;0.35;0.40;1" dur="20s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type-3">
      <rect x="0" y="-20" width="0" height="40">
        <animate attributeName="width" values="0;0;280;280;0;0" keyTimes="0;0.40;0.45;0.55;0.60;1" dur="20s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type-4">
      <rect x="0" y="-20" width="0" height="40">
        <animate attributeName="width" values="0;0;280;280;0;0" keyTimes="0;0.60;0.65;0.75;0.80;1" dur="20s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type-5">
      <rect x="0" y="-20" width="0" height="40">
        <animate attributeName="width" values="0;0;280;280;0" keyTimes="0;0.80;0.85;0.95;1" dur="20s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <style>
    /* Typography & Core Styles Only - Stripped of hover effects for GitHub compatibility */
    .text-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #F8FAFC; }
    .text-muted { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #94A3B8; }
    .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, Monaco, monospace; }
  </style>

  <rect width="1180" height="610" fill="#030712" rx="30" />
  <rect width="1180" height="610" fill="url(#glowPurple)" rx="30" />
  <rect width="1180" height="610" fill="url(#glowCyan)" rx="30" />
  
  <g fill="#22D3EE" fill-opacity="0.4">
