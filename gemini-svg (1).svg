        <tspan x="45" dy="1.2em" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.3s" fill="freeze" />       |    ██▓▒▒░░░░░░░░░░░░░░░░░░░▒▒▓██    |</tspan>
